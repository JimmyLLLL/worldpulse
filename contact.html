    <h1>联系我们</h1>
    <p>欢迎通过以下方式与我们取得联系，无论是反馈建议、链接报错还是合作交流。</p>

    <div class="card-block">
        <h2 style="margin-top:0">GitHub（推荐）</h2>
        <p>在 GitHub 仓库提 Issue 是最快的反馈方式，我们会及时收到通知。</p>
        <a class="cta" href="https://github.com/JimmyLLLL/hello-github-pages/issues" target="_blank" rel="noopener">提交 Issue</a>
    </div>

    <div class="card-block">
        <h2 style="margin-top:0">邮件联系</h2>
        <p>您也可以通过邮件与我们沟通：</p>
        <p><a href="mailto:851664281@qq.com">851664281@qq.com</a></p>
    </div>

    <div class="card-block">
        <h2 style="margin-top:0">常见问题</h2>
        <ul>
            <li><strong>某个平台链接打不开？</strong> 可能是对方网站临时调整，欢迎通过 Issue 告知，我们会更新链接。</li>
            <li><strong>想新增某个平台？</strong> 请在 Issue 中说明平台名称和热搜链接地址。</li>
        </ul>
    </div>
