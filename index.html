<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="全网热搜聚合导航 - 微博、知乎、百度、抖音、B站等热搜一键直达">
    <meta name="keywords" content="热搜,热榜,微博热搜,知乎热榜,百度热搜,抖音热点,今日头条">
    <meta property="og:title" content="全网热搜聚合 · 一键直达">
    <meta property="og:description" content="聚合各大平台热搜，不再来回切换">
    <title>热搜聚合 · 一键直达全网热点</title>
    <link rel="canonical" href="https://jimmyllll.github.io/hello-github-pages/">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "热搜聚合",
      "url": "https://jimmyllll.github.io/hello-github-pages/",
      "description": "聚合各大平台热搜，一键直达全网热点",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://jimmyllll.github.io/hello-github-pages/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2e3a;
            --text: #e4e6eb;
            --text-dim: #8b8fa3;
            --accent: #6366f1;
            --accent-hover: #818cf8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1.5rem 1rem 3rem;
        }
        .container { max-width: 1100px; margin: 0 auto; }

        /* 顶部 */
        header { text-align: center; margin-bottom: 2rem; }
        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #818cf8, #c084fc 50%, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        header p { color: var(--text-dim); font-size: 0.95rem; }
        #clock {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--accent-hover);
            font-variant-numeric: tabular-nums;
        }

        /* 搜索框 */
        .search-wrap {
            display: flex;
            gap: 0.5rem;
            max-width: 560px;
            margin: 1.5rem auto 0.5rem;
        }
        .search-wrap select {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 0.75rem;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .search-wrap input {
            flex: 1;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0 1.25rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-wrap button:hover { background: var(--accent-hover); }

        /* 分类标签 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }
        .tab {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .tab:hover { color: var(--text); border-color: var(--accent); }
        .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.85rem;
        }
        .card {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.9rem 1rem;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.15s, border-color 0.15s, background 0.15s;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: #20242f;
        }
        .icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .card-info { min-width: 0; }
        .card-name { font-size: 0.95rem; font-weight: 600; }
        .card-desc { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

        /* 一言 */
        .quote {
            text-align: center;
            margin: 2.5rem auto 0;
            max-width: 600px;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-style: italic;
            padding: 1rem;
            border-top: 1px solid var(--border);
        }
        .quote span { color: var(--accent-hover); }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        footer a { color: var(--accent-hover); text-decoration: none; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .search-wrap { flex-direction: column; }
            .search-wrap button { padding: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>全网热搜 · 一键直达</h1>
        <p>聚合各大平台热点，不再来回切换</p>
        <div id="clock"></div>
    </header>

    <!-- 搜索框 -->
    <div class="search-wrap">
        <select id="engine">
            <option value="https://www.google.com/search?q=">Google</option>
            <option value="https://www.baidu.com/s?wd=">百度</option>
            <option value="https://www.bing.com/search?q=">Bing</option>
            <option value="https://s.weibo.com/weibo?q=">微博</option>
            <option value="https://www.zhihu.com/search?type=content&q=">知乎</option>
        </select>
        <input id="q" type="text" placeholder="输入关键词，回车搜索…" />
        <button onclick="doSearch()">搜索</button>
    </div>

    <!-- 分类 -->
    <div class="tabs">
        <div class="tab active" data-cat="all">全部</div>
        <div class="tab" data-cat="social">社交</div>
        <div class="tab" data-cat="tech">科技</div>
        <div class="tab" data-cat="video">视频</div>
        <div class="tab" data-cat="news">资讯</div>
        <div class="tab" data-cat="community">社区</div>
    </div>

    <!-- 热搜卡片 -->
    <div class="grid" id="grid"></div>

    <!-- 一言 -->
    <div class="quote" id="quote">加载中…</div>

    <footer>
        <p>
            <a href="about.html">关于</a> ·
            <a href="privacy.html">隐私政策</a> ·
            <a href="contact.html">联系</a> ·
            <a href="https://github.com/JimmyLLLL/hello-github-pages">GitHub</a>
        </p>
        <p style="margin-top:0.5rem;">本站仅提供导航链接，内容版权归各平台所有 · © 2026 热搜聚合</p>
    </footer>
</div>

<script>
// 热搜平台数据
const SITES = [
    { name: "微博热搜", desc: "实时热搜榜", cat: "social", icon: "🔥", color: "#e6162d", url: "https://s.weibo.com/top/summary" },
    { name: "知乎热榜", desc: "热门问题榜", cat: "social", icon: "💡", color: "#0084ff", url: "https://www.zhihu.com/hot" },
    { name: "百度热搜", desc: "实时热点", cat: "social", icon: "🔍", color: "#2932e1", url: "https://top.baidu.com/board?tab=realtime" },
    { name: "抖音热点", desc: "抖音热榜", cat: "video", icon: "🎵", color: "#000000", url: "https://www.douyin.com/hot" },
    { name: "B站热门", desc: "全站日榜", cat: "video", icon: "📺", color: "#fb7299", url: "https://www.bilibili.com/v/popular/rank/all" },
    { name: "今日头条", desc: "头条热榜", cat: "news", icon: "📰", color: "#f04142", url: "https://www.toutiao.com/hot-event/hot-board/?origin=toutiao_pc" },
    { name: "澎湃新闻", desc: "澎湃热榜", cat: "news", icon: "🌊", color: "#ff6d6d", url: "https://www.thepaper.cn/" },
    { name: "36氪", desc: "24小时热榜", cat: "tech", icon: "⚡", color: "#00c389", url: "https://36kr.com/hot-list/catalog" },
    { name: "虎嗅", desc: "热文榜单", cat: "tech", icon: "🐯", color: "#e8382d", url: "https://www.huxiu.com/" },
    { name: "少数派", desc: "热门文章", cat: "tech", icon: "📱", color: "#d33a31", url: "https://sspai.com/" },
    { name: "掘金", desc: "技术热榜", cat: "tech", icon: "⛏️", color: "#1e80ff", url: "https://juejin.cn/hot/articles" },
    { name: "V2EX", desc: "热门节点", cat: "community", icon: "💬", color: "#333333", url: "https://www.v2ex.com/?tab=hot" },
    { name: "吾爱破解", desc: "今日热帖", cat: "community", icon: "🛠️", color: "#1976d2", url: "https://www.52pojie.cn/" },
    { name: "豆瓣小组", desc: "讨论精选", cat: "community", icon: "🎬", color: "#007722", url: "https://www.douban.com/group/explore" },
    { name: "虎扑步行街", desc: "热帖榜单", cat: "community", icon: "🏀", color: "#e03131", url: "https://bbs.hupu.com/all-gambia" },
    { name: "贴吧热议", desc: "热议榜", cat: "social", icon: "📌", color: "#4e6ef2", url: "https://tieba.baidu.com/hottopic/browse/topicList" },
    { name: "知乎日报", desc: "每日精选", cat: "news", icon: "📅", color: "#0084ff", url: "https://daily.zhihu.com/" },
    { name: "IT之家", desc: "热榜资讯", cat: "tech", icon: "💻", color: "#d83232", url: "https://www.ithome.com/" },
];

// 渲染卡片
const grid = document.getElementById("grid");
function render(cat) {
    grid.innerHTML = "";
    const list = cat === "all" ? SITES : SITES.filter(s => s.cat === cat);
    list.forEach(s => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = s.url;
        a.target = "_blank";
        a.rel = "noopener";
        a.innerHTML = `
            <div class="icon" style="background:${s.color}20;color:${s.color}">${s.icon}</div>
            <div class="card-info">
                <div class="card-name">${s.name}</div>
                <div class="card-desc">${s.desc}</div>
            </div>`;
        grid.appendChild(a);
    });
}
render("all");

// 分类切换
document.querySelectorAll(".tab").forEach(t => {
    t.onclick = () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        t.classList.add("active");
        render(t.dataset.cat);
    };
});

// 搜索
function doSearch() {
    const q = document.getElementById("q").value.trim();
    if (!q) return;
    const e = document.getElementById("engine").value;
    window.open(e + encodeURIComponent(q), "_blank");
}
document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
});

// 时钟
function tick() {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    const wk = "日一二三四五六"[d.getDay()];
    document.getElementById("clock").textContent =
        `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} 周${wk} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
tick();
setInterval(tick, 1000);

// 一言（带 3 秒超时，避免卡在"加载中"）
const quoteCtrl = new AbortController();
const quoteTimer = setTimeout(() => quoteCtrl.abort(), 3000);
fetch("https://v1.hitokoto.cn/?c=d&c=i&c=k", { signal: quoteCtrl.signal })
    .then(r => r.json())
    .then(d => {
        clearTimeout(quoteTimer);
        document.getElementById("quote").innerHTML =
            `「${d.hitokoto}」 — <span>${d.from || "佚名"}</span>`;
    })
    .catch(() => {
        clearTimeout(quoteTimer);
        document.getElementById("quote").textContent = "热点常新，理性吃瓜。";
    });
</script>
</body>
</html>
